<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="/styles.css">

    <title>{% if page.title %}{{ page.title }} — {% endif %}Aditya Sarangi</title>
    {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://adityasarangi.com{{ page.url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }} — {% endif %}Aditya Sarangi">

    <meta property="twitter:card" content="summary">

    <meta property="twitter:title" content="{% if page.title %}{{ page.title }} — {% endif %}Aditya Sarangi">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N1YFKE5YHG"></script>

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      gtag('config', 'G-N1YFKE5YHG');
    </script>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="top-nav">
                <a href="/" class="nav-name">Aditya Sarangi</a>
                <nav class="nav-links">
                    <a href="/rabbit-holes/">Rabbit Holes</a>
                    <a href="/music/">Music</a>

</html>
